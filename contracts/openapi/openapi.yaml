        "200":
          description: Triggers
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Trigger"
    post:
      operationId: createTrigger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerCreateInput"
      responses:
        "201":
          description: Created trigger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerCreateResult"
  /api/v2/triggers/{id}:
    get:
      operationId: getTrigger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trigger detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trigger"
    patch:
      operationId: patchTrigger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerPatchInput"
      responses:
        "200":
          description: Updated trigger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trigger"
    delete:
      operationId: deleteTrigger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted trigger
  /api/v2/triggers/{id}/fire:
    post:
      operationId: fireTrigger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerFireInput"
      responses:
        "200":
          description: Trigger fire result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerFireResult"
  /api/v2/webhooks/{key}:
    post:
      operationId: fireWebhookTrigger
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerFireInput"
      responses:
        "200":
          description: Trigger fire result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerFireResult"
components:
  schemas:
    SystemConfig:
      type: object
      required:
        - app_name
        - job_default_timeout_minutes
        - job_max_concurrency
      properties:
        app_name:
          type: string
        job_default_timeout_minutes:
          type: integer
        job_max_concurrency:
          type: integer
    SystemStatus:
      type: object
      required:
        - now
        - database_ok
        - plugin_count
      properties:
        now:
          type: string
          format: date-time
        database_ok:
          type: boolean
        plugin_count:
          type: integer
    SetupStatus:
      type: object
      required:
        - needs_setup
      properties:
        needs_setup:
          type: boolean
    SetupInitializeResult:
      type: object
      required:
        - api_key
        - config
      properties:
        api_key:
          type: string
        config:
          $ref: "#/components/schemas/SystemConfig"
    SystemLogEntry:
      type: object
      required:
        - id
        - source
        - level
        - logger
        - caller
        - message
        - fields
        - created_at
