          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountType"
    post:
      operationId: createAccountType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountTypeCreateInput"
      responses:
        "201":
          description: Created account type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountType"
  /api/v2/account-types/{key}:
    get:
      operationId: getAccountType
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Account type detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountType"
    patch:
      operationId: patchAccountType
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountTypePatchInput"
      responses:
        "200":
          description: Updated account type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountType"
    delete:
      operationId: deleteAccountType
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted account type
  /api/v2/accounts:
    get:
      operationId: listAccounts
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountCreateInput"
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
  /api/v2/accounts/{id}:
    get:
      operationId: getAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    patch:
      operationId: patchAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountPatchInput"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted account
  /api/v2/accounts/{id}/execute:
    post:
      operationId: executeAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountExecuteInput"
      responses:
        "200":
          description: Account action execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountExecuteResult"
  /api/v2/email/accounts:
    get:
      operationId: listEmailAccounts
      responses:
        "200":
          description: Email accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/EmailAccount"
    post:
      operationId: createEmailAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailAccountCreateInput"
      responses:
        "201":
          description: Created email account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailAccount"
  /api/v2/email/accounts/bulk-import:
    post:
      operationId: bulkImportEmailAccounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailBulkImportInput"
      responses:
        "200":
          description: Bulk import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailBulkImportResult"
  /api/v2/email/accounts/{id}:
    get:
      operationId: getEmailAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email account detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailAccount"
    patch:
      operationId: patchEmailAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailAccountPatchInput"
      responses:
        "200":
          description: Updated email account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailAccount"
    delete:
      operationId: deleteEmailAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted email account
  /api/v2/email/accounts/{id}/outlook/authorize-url:
    post:
      operationId: buildOutlookAuthorizeURL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Outlook authorize URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutlookAuthorizeURLResult"
  /api/v2/email/accounts/{id}/outlook/exchange-code:
    post:
      operationId: exchangeOutlookCode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutlookExchangeCodeInput"
      responses:
        "200":
          description: Email account updated with exchanged Outlook tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailAccount"
  /api/v2/email/accounts/{id}/mailboxes:
    get:
      operationId: listEmailMailboxes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: pattern
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Mailboxes available for the configured Outlook account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailMailboxListResult"
  /api/v2/email/accounts/{id}/messages:
    get:
      operationId: listEmailMessages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: mailbox
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Messages in a mailbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailMessageListResult"
  /api/v2/email/accounts/{id}/messages/latest:
    get:
      operationId: getLatestEmailMessage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: mailbox
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Latest message in the requested mailbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLatestMessageResult"
  /api/v2/email/accounts/{id}/messages/{message_id}:
    get:
      operationId: getEmailMessage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: message_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detailed email message payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailMessageDetail"
  /api/v2/email/preview/mailboxes:
    post:
      operationId: previewEmailMailboxes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailPreviewInput"
      responses:
        "200":
