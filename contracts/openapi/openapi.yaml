      operationId: previewLatestEmailMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailPreviewInput"
      responses:
        "200":
          description: Latest message preview using a draft Outlook config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLatestMessageResult"
  /api/v2/triggers:
    get:
      operationId: listTriggers
