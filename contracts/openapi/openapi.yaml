openapi: 3.1.0
info:
  title: OctoManger API v2
  version: 2.0.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /api/v2/system/status:
    get:
      operationId: getSystemStatus
      responses:
        "200":
          description: Current system status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"
  /api/v2/setup/status:
    get:
      operationId: getSetupStatus
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
  /api/v2/setup/initialize:
    post:
      operationId: initializeSetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemConfig"
      responses:
        "201":
          description: Setup initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupInitializeResult"
  /api/v2/system/logs:
    get:
      operationId: getSystemLogs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: System runtime logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemLogListResponse"
  /api/v2/dashboard:
    get:
      operationId: getDashboardSummary
      responses:
        "200":
          description: Dashboard summary snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /api/v2/config:
    get:
      operationId: getConfig
      responses:
        "200":
          description: System configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfig"
    put:
      operationId: putConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemConfig"
      responses:
        "200":
          description: Updated system configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfig"
  /api/v2/plugins:
    get:
      operationId: listPlugins
      responses:
        "200":
          description: Installed plugins
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Plugin"
  /api/v2/plugins/{key}:
    get:
      operationId: getPlugin
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plugin"
  /api/v2/plugins/sync:
    post:
      operationId: syncPlugins
      responses:
        "200":
          description: Plugin account-type sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginSyncResult"
  /api/v2/plugins/{key}/actions/{action}:
    post:
      operationId: executePluginAction
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutePluginActionInput"
      responses:
        "200":
          description: Plugin action execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutePluginActionResult"
  /api/v2/plugins/{key}/settings:
    get:
      operationId: getPluginSettings
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin settings object
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      operationId: putPluginSettings
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Plugin settings save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginSettingsSaveResult"
  /api/v2/plugins/{key}/runtime-config:
    get:
      operationId: getPluginRuntimeConfig
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin runtime config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginRuntimeConfig"
    put:
      operationId: putPluginRuntimeConfig
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginRuntimeConfigInput"
      responses:
        "200":
          description: Updated plugin runtime config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginRuntimeConfig"
  /api/v2/job-definitions:
    get:
      operationId: listJobDefinitions
      responses:
        "200":
          description: Job definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobDefinition"
    post:
      operationId: createJobDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobDefinitionCreateInput"
      responses:
        "201":
          description: Created job definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDefinition"
  /api/v2/job-definitions/{id}:
    get:
      operationId: getJobDefinition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job definition detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDefinition"
    patch:
      operationId: patchJobDefinition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobDefinitionPatchInput"
      responses:
        "200":
          description: Updated job definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDefinition"
    delete:
      operationId: deleteJobDefinition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted job definition
  /api/v2/job-definitions/{id}/executions:
    post:
      operationId: enqueueJobExecution
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Enqueued job execution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobExecution"
  /api/v2/job-executions:
    get:
      operationId: listJobExecutions
      responses:
        "200":
          description: Job executions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobExecution"
  /api/v2/job-executions/{id}:
    get:
      operationId: getJobExecution
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job execution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobExecution"
  /api/v2/job-executions/{id}/events:
    get:
      operationId: streamJobExecutionEvents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job execution SSE stream
          content:
            text/event-stream:
              schema:
                type: string
  /api/v2/agents:
    get:
      operationId: listAgents
      responses:
        "200":
          description: Agent inventory
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreateInput"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
  /api/v2/agents/{id}:
    get:
      operationId: getAgent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    patch:
      operationId: patchAgent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentPatchInput"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      operationId: deleteAgent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted agent
  /api/v2/agents/{id}/status:
    get:
      operationId: getAgentStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
