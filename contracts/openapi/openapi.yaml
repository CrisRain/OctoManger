          description: Agent runtime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatus"
  /api/v2/agents/{id}/start:
    post:
      operationId: startAgent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Agent accepted for start
  /api/v2/agents/{id}/stop:
    post:
      operationId: stopAgent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Agent accepted for stop
  /api/v2/agents/{id}/events:
    get:
      operationId: streamAgentEvents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent SSE stream
          content:
            text/event-stream:
              schema:
                type: string
  /api/v2/account-types:
    get:
      operationId: listAccountTypes
