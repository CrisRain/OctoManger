key: github
name: GitHub
version: "1.0.0"
description: "GitHub 账号管理插件：账号验证、仓库操作、Issue 创建、账号注册及保活守护。"
runtime: python
entrypoint: main.py

capabilities:
  - account_execute
  - jobs
  - daemon

actions:
  - key: VERIFY
    name: 验证活性
    description: "验证 Token 是否可用，检测账号活性"
    modes: [sync]

  - key: HEALTH_CHECK
    name: 健康检查
    description: "VERIFY 的别名，检测账号活性"
    modes: [sync]

  - key: GET_PROFILE
    name: 获取资料
    description: "获取当前认证用户的完整资料"
    modes: [sync]

  - key: LIST_REPOSITORIES
    name: 列出仓库
    description: "列出当前账号或指定组织的仓库"
    modes: [sync]

  - key: GET_REPOSITORY
    name: 获取仓库
    description: "获取单个仓库的详细信息"
    modes: [sync]

  - key: CREATE_REPOSITORY
    name: 创建仓库
    description: "在当前账号或指定组织下创建仓库"
    modes: [sync]

  - key: CREATE_ISSUE
    name: 创建 Issue
    description: "在指定仓库中创建 Issue"
    modes: [sync]

  - key: REGISTER
    name: 注册账号
    description: "自动注册 GitHub 账号（通过 2captcha 解 Arkose 验证码，轮询邮箱获取激活码）"
    modes: [job]

  - key: WATCH
    name: 保活守护
    description: "以心跳模式持续保活，可配置间隔与最长运行时间"
    modes: [daemon]

account_schema:
  type: object
  properties:
    username:
      type: string
      title: "GitHub 用户名"
    token:
      type: string
      title: "Access Token"
      secret: true
    api_base_url:
      type: string
      title: "API Base URL"
      default: "https://api.github.com"
    user_agent:
      type: string
      title: "User-Agent"
    timeout_seconds:
      type: integer
      title: "超时秒数"
      default: 30
      minimum: 5
      maximum: 120
    default_owner:
      type: string
      title: "默认 Owner"
  required:
    - username
    - token

settings_schema:
  type: object
  properties:
    twocaptcha_api_key:
      type: string
      title: "2captcha API Key"
      description: "用于 REGISTER 时自动解 Arkose Labs 验证码"
      secret: true
    proxy:
      type: string
      title: "HTTP 代理"
      description: "注册时使用的代理，格式 http://host:port"

metadata:
  author: "OctoManger"
  homepage: "https://github.com"
  tags: "github,vcs,code-hosting"
