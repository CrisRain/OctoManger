services:
  postgres:
    image: postgres:16
    container_name: octomanger-postgres
    environment:
      POSTGRES_DB: octomanger
      POSTGRES_USER: octo
      POSTGRES_PASSWORD: octo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octo -d octomanger"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: octomanger-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: octomanger-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      API_ADDR: ":8080"
      WEB_DIST_DIR: "/app/web-dist"
      LOG_LEVEL: "info"
      PYTHON_BIN: "python3"
      PLUGINS_DIR: "/app/plugins/modules"
      PLUGIN_SDK_DIR: "/app/plugins/sdk/python"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      ALL_PROXY: "${ALL_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-}"
      DATABASE_DSN: "postgres://octo:octo@postgres:5432/octomanger?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    volumes:
      - ./plugins:/app/plugins
      - pip_cache:/root/.cache/pip

volumes:
  pgdata:
  pip_cache:
  redis_data:
